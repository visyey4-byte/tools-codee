<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>منتجات TOOLS CODE</title>

<link rel="stylesheet" href="style.css">

<style>

.products{
padding:60px;
display:grid;
grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
gap:30px;
}

.product{
background:#10284f;
border-radius:15px;
padding:20px;
text-align:center;
transition:.3s;
}

.product:hover{
transform:translateY(-8px);
}

.product img{
width:100%;
height:180px;
object-fit:cover;
border-radius:12px;
}

.product h3{
margin-top:15px;
}

.price{
font-size:22px;
color:#00d26a;
margin:15px 0;
font-weight:bold;
}

.product button{
padding:12px 25px;
border:none;
background:#1b6cff;
color:white;
border-radius:10px;
cursor:pointer;
}

.badge{
background:red;
padding:5px 12px;
border-radius:20px;
font-size:13px;
display:inline-block;
margin-top:10px;
}

</style>

</head>

<body>

<header>

<div class="logo">
<h1>TOOLS CODE</h1>
<p>جميع المنتجات</p>
</div>

<nav>

<a href="index.html">الرئيسية</a>

</nav>

</header>

<section class="products">

<div class="product">

<img src="https://placehold.co/600x400/png" alt="">

<div class="badge">NEW</div>

<h3>بوت ديسكورد احترافي</h3>

<div class="price">99 ﷼</div>

<button onclick="addToCart('بوت ديسكورد',99)">
إضافة للسلة
</button>

</div>

</section>

<script src="script.js"></script>

</body>
</html>
